<!-- File Name: signup.html -->

<!DOCTYPE html>
<html>

<head>

	<title>Registration Form</title>

	<link rel="stylesheet" href="a5f2_signup.css">

</head>

<body>

	<div class="container">

		<section>

			<h1>Registration Form</h1>

			<form action="a5f4_signup.php" method="POST" onsubmit="return validateForm()">

				<label>Name</label>
				<input type="text" name="name" id="name">

				<label>Date of Birth</label>
				<input type="date" name="dob" id="dob">

				<label>Email</label>
				<input type="email" name="email" id="email">

				<label>Mobile</label>
				<input type="text" name="mobile" id="mobile">

				<label>Address</label>
				<input type="text" name="address" id="address">

				<label>Password</label>
				<input type="password" name="password" id="password">

				<label>Gender</label>

				<div class="row">

					<input type="radio" name="gender" value="Male"> Male

					<input type="radio" name="gender" value="Female"> Female

				</div>

				<label>Country</label>

				<select name="country" id="country">

					<option value="">Select Country</option>
					<option>India</option>
					<option>USA</option>
					<option>UK</option>

				</select>

				<label>Languages</label>

				<div class="row">

					<input type="checkbox" name="language[]" value="English"> English

					<input type="checkbox" name="language[]" value="Hindi"> Hindi

					<input type="checkbox" name="language[]" value="Odia"> Odia

				</div>

				<input type="submit" value="Submit" id="btn">

			</form>

		</section>

	</div>

	<script src="a5f3_signup.js"></script>

</body>

</html>
