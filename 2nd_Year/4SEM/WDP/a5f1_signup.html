<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="a5f2_style.css">
    <script src="a5f3_signup.js"></script>
</head>
<body>
    <div class="container">
        <h2>Registration Form</h2>
        <form action="a5f4_display.php" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <input type="text" name="name" id="name" placeholder="Name">
            </div>

            <div class="form-group">
                <input type="text" name="dob" id="dob" placeholder="DOB (YYYY-MM-DD)">
            </div>

            <div class="form-group">
                <input type="email" name="email" id="email" placeholder="Email">
            </div>

            <div class="form-group">
                <input type="text" name="mobile" id="mobile" placeholder="Mobile">
            </div>

            <div class="form-group">
                <textarea name="address" id="address" rows="3" placeholder="Address"></textarea>
            </div>

            <div class="form-group">
                <input type="password" name="password" id="password" placeholder="Password">
            </div>

            <div class="form-group inline-group">
                <label>Gender:</label>
                <input type="radio" name="gender" value="Male" checked> Male
                <input type="radio" name="gender" value="Female"> Female
            </div>

            <div class="form-group inline-group">
                <label>Country:</label>
                <select name="country" id="country">
                    <option value="" disabled selected>Select Country</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                </select>
            </div>

            <div class="form-group inline-group">
                <label>Languages:</label>
                <input type="checkbox" name="languages[]" value="English"> English
                <input type="checkbox" name="languages[]" value="Hindi"> Hindi
                <input type="checkbox" name="languages[]" value="Odia"> Odia
            </div>

            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
