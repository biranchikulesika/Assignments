<!DOCTYPE html>
<html>

<head>
	<title>Resume Using AJAX</title>

	<link rel="stylesheet" href="a3f2_resume.css">

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	<script src="a3f3_resume.js"></script>
</head>

<body>

	<div class="resume">

		<div class="header">

			<img id="img" src="a3f5_resume.jpeg">

			<h1 id="name">Biranchi Kulesika</h1>

			<p id="title">Full Stack Developer</p>

		</div>

		<div class="section">

			<h2>Career Objective</h2>

			<p id="objective"></p>

		</div>

		<div class="section">

			<h2>Education</h2>

			<table id="eduTable">

				<tr>
					<th>Degree</th>
					<th>Institute</th>
					<th>Year</th>
					<th>Score</th>
				</tr>

			</table>

		</div>

		<div class="section">

			<h2>Skills</h2>

			<div id="skills"></div>

		</div>

		<div class="section">

			<h2>Projects</h2>

			<div id="projects"></div>

		</div>

	</div>

</body>

</html>
